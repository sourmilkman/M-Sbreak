<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#00401C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="M&S Breaktimer">
<title>M&amp;S Breaktimer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --ms-green: #00401C;
    --ms-green-deep: #002D14;
    --ms-green-light: #1F5E3A;
    --ms-cream: #F5F1E8;
    --ms-gold: #B8956A;
    --ms-muted: rgba(245, 241, 232, 0.55);
    --ms-line: rgba(245, 241, 232, 0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; background: var(--ms-green-deep); }
  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ms-cream);
    background: radial-gradient(ellipse at top, var(--ms-green-light) 0%, var(--ms-green) 40%, var(--ms-green-deep) 100%);
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    user-select: none; -webkit-user-select: none;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    opacity: 0.05; pointer-events: none; z-index: 1;
  }
  .app {
    flex: 1; display: flex; flex-direction: column;
    padding: 24px 28px 32px; position: relative; z-index: 2;
    max-width: 480px; margin: 0 auto; width: 100%;
  }
  header { text-align: center; padding-top: 12px; }
  .brand-mark { font-weight: 800; font-size: 26px; letter-spacing: -0.04em; line-height: 1; }
  .brand-mark .amp { font-weight: 300; color: var(--ms-gold); margin: 0 1px; }
  .brand-sub {
    font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--ms-muted); margin-top: 8px; font-weight: 500;
  }
  .divider { width: 32px; height: 1px; background: var(--ms-gold); margin: 16px auto 0; opacity: 0.6; }

  .timer-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-wrap { position: relative; width: min(78vw, 320px); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
  .ring { position: absolute; inset: 0; transform: rotate(-90deg); }
  .ring circle { fill: none; stroke-width: 2; }
  .ring .track { stroke: var(--ms-line); }
  .ring .progress { stroke: var(--ms-gold); stroke-linecap: round; transition: stroke-dashoffset 0.95s linear; }

  .timer-display { text-align: center; position: relative; z-index: 1; cursor: pointer; }
  .time {
    font-weight: 200; font-size: clamp(64px, 20vw, 100px); letter-spacing: -0.05em; line-height: 1;
    font-variant-numeric: tabular-nums; transition: color 0.3s ease;
    display: inline-block; padding: 4px 8px; border-radius: 4px;
  }
  .time.warning { color: var(--ms-gold); }
  .time.done { color: #FF8A65; animation: pulse 0.8s ease-in-out infinite; }
  .timer-display.editable .time { border-bottom: 1px dashed var(--ms-line); }
  .timer-display.editable:active .time { background: rgba(245, 241, 232, 0.06); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .label {
    margin-top: 14px; font-size: 10px; letter-spacing: 0.36em; text-transform: uppercase;
    color: var(--ms-muted); min-height: 14px; font-weight: 500;
  }
  .label.active { color: var(--ms-gold); }
  .hint { font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ms-muted); margin-top: 6px; opacity: 0.6; font-weight: 500; }

  .time-editor { display: none; flex-direction: column; align-items: center; gap: 16px; }
  .time-editor.open { display: flex; }
  .timer-display.editing { display: none; }
  .stepper { display: flex; align-items: center; gap: 16px; }
  .step-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(245, 241, 232, 0.06); border: 1px solid var(--ms-line);
    color: var(--ms-cream); font-size: 28px; font-weight: 300; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .step-btn:active { background: rgba(245, 241, 232, 0.14); transform: scale(0.95); }
  .step-value {
    font-size: clamp(56px, 16vw, 80px); font-weight: 200; letter-spacing: -0.04em; line-height: 1;
    min-width: 140px; text-align: center; font-variant-numeric: tabular-nums;
  }
  .step-unit { font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--ms-muted); font-weight: 500; }
  .step-done {
    margin-top: 4px; background: var(--ms-gold); color: var(--ms-green-deep); border: none;
    padding: 12px 32px; border-radius: 2px; font-family: inherit;
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 700;
  }

  .controls { display: flex; flex-direction: column; gap: 14px; padding-top: 24px; }
  .duration-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn-duration {
    background: rgba(245, 241, 232, 0.04); border: 1px solid var(--ms-line);
    color: var(--ms-cream); padding: 18px 14px; border-radius: 2px;
    font-family: inherit; cursor: pointer; transition: all 0.2s ease;
    text-align: left; backdrop-filter: blur(10px);
  }
  .btn-duration:active { background: rgba(245, 241, 232, 0.1); transform: scale(0.98); }
  .btn-duration.selected { background: var(--ms-cream); color: var(--ms-green-deep); border-color: var(--ms-cream); }
  .btn-duration .mins { font-size: 24px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; display: flex; align-items: baseline; gap: 4px; }
  .btn-duration .mins .unit { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.7; }
  .btn-duration .desc { font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; margin-top: 6px; opacity: 0.65; font-weight: 500; }

  .action-row { display: flex; gap: 12px; margin-top: 4px; }
  .btn-primary, .btn-secondary {
    flex: 1; padding: 16px; border-radius: 2px; font-family: inherit;
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 700;
    cursor: pointer; transition: all 0.2s ease; border: 1px solid var(--ms-line);
  }
  .btn-primary { background: var(--ms-gold); color: var(--ms-green-deep); border-color: var(--ms-gold); flex: 2; }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--ms-cream); }
  .btn-secondary:active { background: rgba(245, 241, 232, 0.08); }

  .settings-link { text-align: center; margin-top: 16px; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ms-muted); cursor: pointer; font-weight: 500; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,20,8,0.85); backdrop-filter: blur(8px); z-index: 10; display: none; align-items: flex-end; justify-content: center; }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--ms-green); border-top: 1px solid var(--ms-gold);
    width: 100%; max-width: 480px;
    padding: 28px 28px calc(28px + env(safe-area-inset-bottom));
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal h2 { font-weight: 700; font-size: 22px; letter-spacing: -0.02em; margin-bottom: 4px; }
  .modal .sub { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--ms-muted); margin-bottom: 20px; font-weight: 500; }
  .toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--ms-line); }
  .toggle-row:last-of-type { border-bottom: none; }
  .toggle-row span { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; }
  .toggle { width: 44px; height: 24px; background: rgba(245,241,232,0.15); border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
  .toggle.on { background: var(--ms-gold); }
  .toggle::after { content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; background: var(--ms-cream); border-radius: 50%; transition: transform 0.2s; }
  .toggle.on::after { transform: translateX(20px); background: var(--ms-green-deep); }

  /* Done overlay - fixed: children no longer flex-grow into giant rectangles */
  .done-overlay {
    position: fixed; inset: 0; background: var(--ms-green-deep); z-index: 20;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 28px; text-align: center;
  }
  .done-overlay.open { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .done-overlay > * { flex: 0 0 auto; max-width: 100%; }
  .done-overlay .small { font-size: 11px; letter-spacing: 0.36em; text-transform: uppercase; color: var(--ms-muted); font-weight: 500; margin-bottom: 20px; }
  .done-overlay .big { font-weight: 200; font-size: clamp(48px, 14vw, 72px); letter-spacing: -0.04em; line-height: 1; color: var(--ms-gold); margin-bottom: 16px; }
  .done-overlay .which { font-size: 11px; letter-spacing: 0.36em; text-transform: uppercase; color: var(--ms-muted); font-weight: 500; margin-bottom: 40px; }
  .done-overlay .dismiss {
    background: var(--ms-gold); color: var(--ms-green-deep); border: none;
    padding: 16px 48px; border-radius: 2px; font-family: inherit;
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; font-weight: 700;
    width: auto; min-width: 220px; cursor: pointer;
  }
  .done-overlay .dismiss:active { opacity: 0.85; transform: scale(0.98); }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand-mark">M<span class="amp">&amp;</span>S</div>
    <div class="brand-sub">Breaktimer</div>
    <div class="divider"></div>
  </header>

  <div class="timer-stage">
    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 200 200">
        <circle class="track" cx="100" cy="100" r="96"></circle>
        <circle class="progress" cx="100" cy="100" r="96" stroke-dasharray="603.19" stroke-dashoffset="0"></circle>
      </svg>

      <div class="timer-display" id="timer-display">
        <div class="time" id="time">00:00</div>
        <div class="label" id="label">Choose a break</div>
        <div class="hint" id="hint" style="display:none;">Tap to adjust</div>
      </div>

      <div class="time-editor" id="editor">
        <div class="step-unit">Minutes</div>
        <div class="stepper">
          <button class="step-btn" id="step-down">−</button>
          <div class="step-value" id="step-value">30</div>
          <button class="step-btn" id="step-up">+</button>
        </div>
        <button class="step-done" id="step-done">Done</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="duration-row">
      <button class="btn-duration" data-slot="lunch" id="btn-lunch">
        <div class="mins"><span id="lunch-mins">30</span><span class="unit">min</span></div>
        <div class="desc">Lunch</div>
      </button>
      <button class="btn-duration" data-slot="afternoon" id="btn-afternoon">
        <div class="mins"><span id="afternoon-mins">15</span><span class="unit">min</span></div>
        <div class="desc">Afternoon</div>
      </button>
    </div>
    <div class="action-row">
      <button class="btn-primary" id="btn-start" disabled>Start</button>
      <button class="btn-secondary" id="btn-reset">Reset</button>
    </div>
    <div class="settings-link" id="open-settings">Sound &amp; alerts</div>
  </div>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h2>Alerts</h2>
    <div class="sub">When the timer finishes</div>
    <div class="toggle-row"><span>Vibrate</span><div class="toggle on" id="toggle-vibrate"></div></div>
    <div class="toggle-row"><span>Sound</span><div class="toggle on" id="toggle-sound"></div></div>
    <div class="toggle-row"><span>Notification</span><div class="toggle on" id="toggle-notify"></div></div>
    <div class="action-row" style="margin-top:24px;">
      <button class="btn-primary" id="save-settings">Save</button>
      <button class="btn-secondary" id="close-settings">Cancel</button>
    </div>
  </div>
</div>

<div class="done-overlay" id="done">
  <div class="small">Time's up</div>
  <div class="big">Break&apos;s over</div>
  <div class="which" id="done-which">Lunch</div>
  <button class="dismiss" id="dismiss-done">Dismiss</button>
</div>

<script>
  const STORE = 'ms-breaktimer-v1';
  const defaults = { lunch: 30, afternoon: 15, vibrate: true, sound: true, notify: true };
  const state = Object.assign({}, defaults, JSON.parse(localStorage.getItem(STORE) || '{}'));

  let selected = null, totalSec = 0, remainSec = 0, intervalId = null, endAt = 0, running = false;
  let wakeLock = null, audioCtx = null, chimeLoop = null;

  const $ = id => document.getElementById(id);
  const ringCircumference = 2 * Math.PI * 96;

  function fmt(s) {
    s = Math.max(0, Math.round(s));
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }
  function save() { localStorage.setItem(STORE, JSON.stringify(state)); }

  function renderDurations() {
    $('lunch-mins').textContent = state.lunch;
    $('afternoon-mins').textContent = state.afternoon;
    $('toggle-vibrate').classList.toggle('on', state.vibrate);
    $('toggle-sound').classList.toggle('on', state.sound);
    $('toggle-notify').classList.toggle('on', state.notify);
  }

  function renderTimer() {
    const t = $('time');
    t.textContent = fmt(remainSec);
    t.classList.toggle('warning', running && remainSec > 0 && remainSec <= 60);
    t.classList.toggle('done', remainSec === 0 && totalSec > 0 && !running);
    const progress = totalSec > 0 ? remainSec / totalSec : 0;
    document.querySelector('.ring .progress').style.strokeDashoffset = ringCircumference * (1 - progress);

    const label = $('label'), hint = $('hint'), display = $('timer-display');
    if (running) {
      label.textContent = selected === 'lunch' ? 'Lunch in progress' : 'Afternoon break';
      label.classList.add('active');
      hint.style.display = 'none';
      display.classList.remove('editable');
    } else if (selected) {
      label.textContent = 'Ready · ' + state[selected] + ' min';
      label.classList.remove('active');
      hint.style.display = 'block';
      display.classList.add('editable');
    } else {
      label.textContent = 'Choose a break';
      label.classList.remove('active');
      hint.style.display = 'none';
      display.classList.remove('editable');
    }
  }

  function selectSlot(slot) {
    if (running) return;
    selected = slot;
    totalSec = state[slot] * 60;
    remainSec = totalSec;
    document.querySelectorAll('.btn-duration').forEach(b => b.classList.toggle('selected', b.dataset.slot === slot));
    $('btn-start').disabled = false;
    renderTimer();
  }

  // Inline editor
  function openEditor() {
    if (running || !selected) return;
    $('step-value').textContent = state[selected];
    $('timer-display').classList.add('editing');
    $('editor').classList.add('open');
  }
  function closeEditor() {
    const v = parseInt($('step-value').textContent, 10);
    if (v > 0 && v <= 180) { state[selected] = v; save(); renderDurations(); selectSlot(selected); }
    $('timer-display').classList.remove('editing');
    $('editor').classList.remove('open');
  }
  $('timer-display').addEventListener('click', e => {
    // Only open editor when clicking the display itself, not children inside the editor
    if ($('editor').classList.contains('open')) return;
    openEditor();
  });
  $('step-up').addEventListener('click', e => {
    e.stopPropagation();
    $('step-value').textContent = Math.min(180, parseInt($('step-value').textContent,10) + 1);
    if (navigator.vibrate) navigator.vibrate(8);
  });
  $('step-down').addEventListener('click', e => {
    e.stopPropagation();
    $('step-value').textContent = Math.max(1, parseInt($('step-value').textContent,10) - 1);
    if (navigator.vibrate) navigator.vibrate(8);
  });
  let holdTimer = null;
  function startHold(dir) {
    holdTimer = setInterval(() => {
      const cur = parseInt($('step-value').textContent, 10);
      $('step-value').textContent = dir > 0 ? Math.min(180, cur+1) : Math.max(1, cur-1);
    }, 100);
  }
  function stopHold() { if (holdTimer) { clearInterval(holdTimer); holdTimer = null; } }
  $('step-up').addEventListener('pointerdown', e => { e.stopPropagation(); setTimeout(() => startHold(1), 350); });
  $('step-down').addEventListener('pointerdown', e => { e.stopPropagation(); setTimeout(() => startHold(-1), 350); });
  ['pointerup','pointerleave','pointercancel'].forEach(e => {
    $('step-up').addEventListener(e, stopHold);
    $('step-down').addEventListener(e, stopHold);
  });
  $('step-done').addEventListener('click', e => { e.stopPropagation(); closeEditor(); });

  // Audio chime
  function ensureAudio() {
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function playBeep(freq, when, duration, gain) {
    if (!audioCtx) return;
    gain = gain || 0.3;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = freq; o.type = 'sine';
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(gain, when + 0.02);
    g.gain.linearRampToValueAtTime(0, when + duration);
    o.connect(g).connect(audioCtx.destination);
    o.start(when); o.stop(when + duration + 0.05);
  }
  function playChime() {
    const ctx = ensureAudio(); if (!ctx) return;
    const t = ctx.currentTime;
    playBeep(523, t, 0.25);
    playBeep(659, t + 0.18, 0.25);
    playBeep(784, t + 0.36, 0.45);
  }
  function startChimeLoop() {
    if (!state.sound) return;
    playChime();
    chimeLoop = setInterval(playChime, 1500);
  }
  function stopChimeLoop() { if (chimeLoop) { clearInterval(chimeLoop); chimeLoop = null; } }

  function tick() {
    remainSec = Math.max(0, Math.round((endAt - Date.now()) / 1000));
    renderTimer();
    if (remainSec <= 0) finish();
  }

  async function start() {
    if (!selected || running) return;
    if (remainSec <= 0) remainSec = totalSec;
    endAt = Date.now() + remainSec * 1000;
    running = true;
    $('btn-start').textContent = 'Pause';
    ensureAudio();
    scheduleAlarm(endAt);
    requestWakeLock();
    if (state.notify && 'Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    intervalId = setInterval(tick, 250);
    renderTimer();
  }

  function pause() {
    if (!running) return;
    clearInterval(intervalId); intervalId = null;
    remainSec = Math.max(0, Math.round((endAt - Date.now())/1000));
    running = false;
    $('btn-start').textContent = 'Resume';
    cancelAlarm(); releaseWakeLock();
    renderTimer();
  }

  function reset() {
    clearInterval(intervalId); intervalId = null;
    running = false;
    remainSec = selected ? state[selected] * 60 : 0;
    totalSec = remainSec;
    $('btn-start').textContent = 'Start';
    $('btn-start').disabled = !selected;
    cancelAlarm(); stopChimeLoop(); releaseWakeLock();
    renderTimer();
  }

  function finish() {
    clearInterval(intervalId); intervalId = null;
    running = false; remainSec = 0;
    cancelAlarm(); releaseWakeLock();
    if (state.vibrate && 'vibrate' in navigator) navigator.vibrate([500,200,500,200,500,200,800]);
    if (state.sound) startChimeLoop();
    showNotification();
    $('done-which').textContent = selected === 'lunch' ? 'Lunch break' : 'Afternoon break';
    $('done').classList.add('open');
    $('btn-start').textContent = 'Start';
    renderTimer();
  }

  function scheduleAlarm(endTimestamp) {
    if (!navigator.serviceWorker || !navigator.serviceWorker.controller) return;
    navigator.serviceWorker.controller.postMessage({
      type: 'schedule-alarm', endAt: endTimestamp,
      label: selected === 'lunch' ? 'Lunch break' : 'Afternoon break',
      vibrate: state.vibrate, notify: state.notify
    });
  }
  function cancelAlarm() {
    if (!navigator.serviceWorker || !navigator.serviceWorker.controller) return;
    navigator.serviceWorker.controller.postMessage({ type: 'cancel-alarm' });
  }
  function showNotification() {
    if (!state.notify) return;
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    const opts = {
      body: 'Your ' + selected + ' break has finished.',
      icon: 'icon-192.png', badge: 'icon-192.png', tag: 'ms-break-done',
      requireInteraction: true,
      vibrate: state.vibrate ? [500,200,500,200,500] : undefined,
      silent: false
    };
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready.then(r => r.showNotification('M&S Breaktimer — Time\u2019s up', opts));
    } else {
      try { new Notification('M&S Breaktimer — Time\u2019s up', opts); } catch(e){}
    }
  }

  async function requestWakeLock() {
    try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
  }
  function releaseWakeLock() { if (wakeLock) { try { wakeLock.release(); } catch(e){} wakeLock = null; } }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && running) requestWakeLock();
  });

  $('btn-lunch').addEventListener('click', () => selectSlot('lunch'));
  $('btn-afternoon').addEventListener('click', () => selectSlot('afternoon'));
  $('btn-start').addEventListener('click', () => running ? pause() : start());
  $('btn-reset').addEventListener('click', reset);

  $('open-settings').addEventListener('click', () => { renderDurations(); $('modal').classList.add('open'); });
  $('close-settings').addEventListener('click', () => $('modal').classList.remove('open'));
  $('save-settings').addEventListener('click', () => {
    state.vibrate = $('toggle-vibrate').classList.contains('on');
    state.sound   = $('toggle-sound').classList.contains('on');
    state.notify  = $('toggle-notify').classList.contains('on');
    save();
    if (state.notify && 'Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    $('modal').classList.remove('open');
  });
  ['toggle-vibrate','toggle-sound','toggle-notify'].forEach(id =>
    $(id).addEventListener('click', e => e.currentTarget.classList.toggle('on')));

  $('dismiss-done').addEventListener('click', () => {
    $('done').classList.remove('open');
    stopChimeLoop();
    if ('vibrate' in navigator) navigator.vibrate(0);
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready.then(r => r.getNotifications({tag:'ms-break-done'}).then(ns => ns.forEach(n => n.close())));
    }
    reset();
  });

  renderDurations();
  renderTimer();

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
