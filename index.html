<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#00401C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="M&S Breaktimer">
<title>M&amp;S Breaktimer</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --green: #00401C; --green-deep: #002D14; --green-light: #1F5E3A;
  --cream: #F5F1E8; --gold: #B8956A;
  --muted: rgba(245,241,232,0.55); --line: rgba(245,241,232,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--green-deep); }
body {
  font-family: 'Manrope', sans-serif; color: var(--cream);
  background: radial-gradient(ellipse at top, var(--green-light), var(--green) 45%, var(--green-deep));
  display: flex; flex-direction: column;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  user-select: none; -webkit-user-select: none;
}
.app {
  flex: 1; display: flex; flex-direction: column;
  padding: 24px 28px 32px; max-width: 480px; margin: 0 auto; width: 100%;
}
header { text-align: center; padding-top: 12px; }
.brand { font-weight: 800; font-size: 26px; letter-spacing: -0.04em; }
.brand .amp { font-weight: 300; color: var(--gold); }
.brand-sub { font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); margin-top: 8px; font-weight: 500; }
.divider { width: 32px; height: 1px; background: var(--gold); margin: 16px auto 0; opacity: 0.6; }

.timer-stage {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.ring-wrap {
  position: relative; width: min(78vw, 300px); aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
}
.ring { position: absolute; inset: 0; transform: rotate(-90deg); }
.ring circle { fill: none; stroke-width: 2; }
.ring .track { stroke: var(--line); }
.ring .progress { stroke: var(--gold); stroke-linecap: round; transition: stroke-dashoffset 0.95s linear; }
.timer-center { text-align: center; position: relative; z-index: 1; }
.time {
  font-weight: 200; font-size: clamp(60px, 18vw, 90px); letter-spacing: -0.05em; line-height: 1;
  font-variant-numeric: tabular-nums; transition: color 0.3s;
}
.time.warning { color: var(--gold); }
.time.done { color: #FF8A65; animation: pulse 0.8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.tlabel { margin-top: 12px; font-size: 10px; letter-spacing: 0.34em; text-transform: uppercase; color: var(--muted); font-weight: 500; min-height: 14px; }
.tlabel.active { color: var(--gold); }
.thint { font-size: 9px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--muted); margin-top: 5px; opacity: 0.55; font-weight: 500; }

.controls { display: flex; flex-direction: column; gap: 14px; padding-top: 24px; }
.dur-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn-dur {
  background: rgba(245,241,232,0.04); border: 1px solid var(--line); color: var(--cream);
  padding: 18px 14px; border-radius: 2px; font-family: inherit; cursor: pointer;
  transition: all 0.18s; text-align: left;
}
.btn-dur:active { transform: scale(0.97); background: rgba(245,241,232,0.09); }
.btn-dur.sel { background: var(--cream); color: var(--green-deep); border-color: var(--cream); }
.btn-dur .mins { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; display: flex; align-items: baseline; gap: 3px; }
.btn-dur .mins .u { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; opacity: 0.65; }
.btn-dur .desc { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; margin-top: 5px; opacity: 0.6; font-weight: 500; }
.act-row { display: flex; gap: 12px; }
.btn-p, .btn-s {
  flex: 1; padding: 16px; border-radius: 2px; font-family: inherit;
  font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 700;
  cursor: pointer; transition: all 0.18s; border: 1px solid var(--line);
}
.btn-p { background: var(--gold); color: var(--green-deep); border-color: var(--gold); flex: 2; }
.btn-p:active { opacity: 0.85; transform: scale(0.97); }
.btn-p:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-s { background: transparent; color: var(--cream); }
.btn-s:active { background: rgba(245,241,232,0.08); }
.settings-link { text-align: center; margin-top: 16px; font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--muted); cursor: pointer; font-weight: 500; }

/* Bottom sheets */
.sheet-bg {
  position: fixed; inset: 0; background: rgba(0,18,7,0.82); backdrop-filter: blur(8px);
  z-index: 10; display: none; align-items: flex-end; justify-content: center;
}
.sheet-bg.open { display: flex; }
.sheet {
  background: var(--green); border-top: 1px solid var(--gold);
  width: 100%; max-width: 480px;
  padding: 28px 28px calc(28px + env(safe-area-inset-bottom));
  animation: up 0.28s ease;
}
@keyframes up { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet h2 { font-weight: 700; font-size: 20px; letter-spacing: -0.02em; margin-bottom: 4px; }
.sheet .sub { font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; font-weight: 500; }

/* Stepper inside editor sheet */
.stepper { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 8px 0 20px; }
.sbtn {
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(245,241,232,0.08); border: 1px solid var(--line);
  color: var(--cream); font-size: 30px; font-weight: 300; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.sbtn:active { background: rgba(245,241,232,0.18); }
.sval {
  font-size: 72px; font-weight: 200; letter-spacing: -0.04em; line-height: 1;
  min-width: 120px; text-align: center; font-variant-numeric: tabular-nums;
}
.sunit { text-align: center; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 24px; }

/* Toggles */
.tog-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--line); }
.tog-row:last-of-type { border-bottom: none; }
.tog-row span { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; }
.tog { width: 44px; height: 24px; background: rgba(245,241,232,0.15); border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
.tog.on { background: var(--gold); }
.tog::after { content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; background:var(--cream); border-radius:50%; transition:transform 0.2s; }
.tog.on::after { transform:translateX(20px); background:var(--green-deep); }

/* Done overlay */
.done-overlay {
  position: fixed; inset: 0; background: var(--green-deep); z-index: 20;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 28px; text-align: center; gap: 0;
}
.done-overlay.open { display: flex; animation: fadein 0.4s ease; }
@keyframes fadein { from{opacity:0} to{opacity:1} }
.done-sm { font-size: 11px; letter-spacing: 0.34em; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 18px; }
.done-big { font-weight: 200; font-size: clamp(48px,13vw,70px); letter-spacing: -0.04em; color: var(--gold); margin-bottom: 14px; }
.done-which { font-size: 11px; letter-spacing: 0.34em; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 40px; }
.done-dismiss {
  background: var(--gold); color: var(--green-deep); border: none;
  padding: 16px 52px; border-radius: 2px; font-family: inherit;
  font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 700;
  cursor: pointer; flex-shrink: 0;
}
.done-dismiss:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">M<span class="amp">&amp;</span>S</div>
    <div class="brand-sub">Breaktimer</div>
    <div class="divider"></div>
  </header>

  <div class="timer-stage">
    <div class="ring-wrap">
      <svg class="ring" viewBox="0 0 200 200">
        <circle class="track" cx="100" cy="100" r="96"/>
        <circle class="progress" id="ring-progress" cx="100" cy="100" r="96" stroke-dasharray="603.19" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-center" id="timer-center">
        <div class="time" id="time-display">00:00</div>
        <div class="tlabel" id="tlabel">Choose a break</div>
        <div class="thint" id="thint" style="visibility:hidden">Tap to adjust</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="dur-row">
      <button class="btn-dur" id="btn-lunch">
        <div class="mins"><span id="lunch-mins">30</span><span class="u">min</span></div>
        <div class="desc">Lunch</div>
      </button>
      <button class="btn-dur" id="btn-afternoon">
        <div class="mins"><span id="afternoon-mins">15</span><span class="u">min</span></div>
        <div class="desc">Afternoon</div>
      </button>
    </div>
    <div class="act-row">
      <button class="btn-p" id="btn-start" disabled>Start</button>
      <button class="btn-s" id="btn-reset">Reset</button>
    </div>
    <div class="settings-link" id="open-alerts">Sound &amp; alerts</div>
  </div>
</div>

<!-- Duration editor sheet -->
<div class="sheet-bg" id="editor-bg">
  <div class="sheet">
    <h2>Adjust duration</h2>
    <div class="sub" id="editor-label">Lunch break</div>
    <div class="stepper">
      <button class="sbtn" id="sdown">&#x2212;</button>
      <div class="sval" id="sval">30</div>
      <button class="sbtn" id="sup">+</button>
    </div>
    <div class="sunit">minutes</div>
    <div class="act-row">
      <button class="btn-p" id="editor-set">Set</button>
      <button class="btn-s" id="editor-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Alerts settings sheet -->
<div class="sheet-bg" id="alerts-bg">
  <div class="sheet">
    <h2>Alerts</h2>
    <div class="sub">When the timer finishes</div>
    <div class="tog-row"><span>Vibrate</span><div class="tog on" id="tog-vibrate"></div></div>
    <div class="tog-row"><span>Sound</span><div class="tog on" id="tog-sound"></div></div>
    <div class="tog-row"><span>Notification</span><div class="tog on" id="tog-notify"></div></div>
    <div class="act-row" style="margin-top:24px">
      <button class="btn-p" id="alerts-save">Save</button>
      <button class="btn-s" id="alerts-cancel">Cancel</button>
    </div>
  </div>
</div>

<!-- Done overlay -->
<div class="done-overlay" id="done-overlay">
  <div class="done-sm">Time's up</div>
  <div class="done-big">Break's over</div>
  <div class="done-which" id="done-which">Lunch break</div>
  <button class="done-dismiss" id="done-dismiss">Dismiss</button>
</div>

<script>
const STORE = 'ms-bt-v3';
const DEF = { lunch:30, afternoon:15, vibrate:true, sound:true, notify:true };
let cfg = Object.assign({}, DEF, JSON.parse(localStorage.getItem(STORE)||'{}'));

let slot = null, totalSec = 0, remainSec = 0, endAt = 0, running = false;
let ticker = null, chimer = null, wakeLock = null, audioCtx = null;

const el = id => document.getElementById(id);
const CIRC = 2 * Math.PI * 96;

function saveCfg() { localStorage.setItem(STORE, JSON.stringify(cfg)); }

function fmt(s) {
  s = Math.max(0, Math.round(s));
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}

function render() {
  const t = el('time-display');
  t.textContent = fmt(remainSec);
  t.className = 'time' +
    (running && remainSec > 0 && remainSec <= 60 ? ' warning' : '') +
    (remainSec === 0 && totalSec > 0 && !running ? ' done' : '');

  const pct = totalSec > 0 ? remainSec / totalSec : 0;
  el('ring-progress').style.strokeDashoffset = CIRC * (1 - pct);

  const lbl = el('tlabel'), hint = el('thint');
  if (running) {
    lbl.textContent = slot === 'lunch' ? 'Lunch in progress' : 'Afternoon break';
    lbl.className = 'tlabel active';
    hint.style.visibility = 'hidden';
    el('timer-center').style.cursor = 'default';
  } else if (slot) {
    lbl.textContent = 'Ready \u00b7 ' + cfg[slot] + ' min';
    lbl.className = 'tlabel';
    hint.style.visibility = 'visible';
    el('timer-center').style.cursor = 'pointer';
  } else {
    lbl.textContent = 'Choose a break';
    lbl.className = 'tlabel';
    hint.style.visibility = 'hidden';
    el('timer-center').style.cursor = 'default';
  }

  el('lunch-mins').textContent = cfg.lunch;
  el('afternoon-mins').textContent = cfg.afternoon;
}

function pick(s) {
  if (running) return;
  slot = s;
  totalSec = cfg[slot] * 60;
  remainSec = totalSec;
  el('btn-lunch').classList.toggle('sel', slot === 'lunch');
  el('btn-afternoon').classList.toggle('sel', slot === 'afternoon');
  el('btn-start').disabled = false;
  render();
}

// ---- Editor sheet ----
el('timer-center').addEventListener('click', () => {
  if (!slot || running) return;
  el('editor-label').textContent = slot === 'lunch' ? 'Lunch break' : 'Afternoon break';
  el('sval').textContent = String(cfg[slot]);
  el('editor-bg').classList.add('open');
});

function stepBy(delta) {
  const cur = parseInt(el('sval').textContent, 10) || cfg[slot];
  el('sval').textContent = String(Math.min(180, Math.max(1, cur + delta)));
  if (navigator.vibrate) navigator.vibrate(8);
}

el('sup').addEventListener('click', () => stepBy(1));
el('sdown').addEventListener('click', () => stepBy(-1));

// Long press to fast-scroll
let holdTimeout = null, holdInterval = null;
function endHold() {
  clearTimeout(holdTimeout); holdTimeout = null;
  clearInterval(holdInterval); holdInterval = null;
}
function startHold(delta) {
  holdTimeout = setTimeout(() => {
    holdInterval = setInterval(() => stepBy(delta), 80);
  }, 400);
}
['pointerdown','touchstart'].forEach(ev => {
  el('sup').addEventListener(ev, e => { e.preventDefault(); startHold(1); });
  el('sdown').addEventListener(ev, e => { e.preventDefault(); startHold(-1); });
});
['pointerup','pointerleave','pointercancel','touchend','touchcancel'].forEach(ev => {
  el('sup').addEventListener(ev, endHold);
  el('sdown').addEventListener(ev, endHold);
});

el('editor-set').addEventListener('click', () => {
  const v = parseInt(el('sval').textContent, 10);
  if (v >= 1 && v <= 180) { cfg[slot] = v; saveCfg(); }
  el('editor-bg').classList.remove('open');
  pick(slot); // re-select to refresh display
});
el('editor-cancel').addEventListener('click', () => el('editor-bg').classList.remove('open'));

// ---- Alerts sheet ----
el('open-alerts').addEventListener('click', () => {
  el('tog-vibrate').classList.toggle('on', cfg.vibrate);
  el('tog-sound').classList.toggle('on', cfg.sound);
  el('tog-notify').classList.toggle('on', cfg.notify);
  el('alerts-bg').classList.add('open');
});
['tog-vibrate','tog-sound','tog-notify'].forEach(id =>
  el(id).addEventListener('click', e => e.currentTarget.classList.toggle('on')));
el('alerts-save').addEventListener('click', () => {
  cfg.vibrate = el('tog-vibrate').classList.contains('on');
  cfg.sound   = el('tog-sound').classList.contains('on');
  cfg.notify  = el('tog-notify').classList.contains('on');
  saveCfg();
  if (cfg.notify && 'Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  el('alerts-bg').classList.remove('open');
});
el('alerts-cancel').addEventListener('click', () => el('alerts-bg').classList.remove('open'));

// ---- Timer ----
function tick() {
  remainSec = Math.max(0, Math.round((endAt - Date.now()) / 1000));
  render();
  if (remainSec <= 0) finish();
}

el('btn-start').addEventListener('click', () => {
  if (running) {
    // Pause
    clearInterval(ticker); ticker = null;
    remainSec = Math.max(0, Math.round((endAt - Date.now()) / 1000));
    running = false;
    el('btn-start').textContent = 'Resume';
    cancelAlarm(); releaseWake();
    render();
  } else {
    // Start / Resume
    if (!slot) return;
    if (remainSec <= 0) remainSec = totalSec;
    endAt = Date.now() + remainSec * 1000;
    running = true;
    el('btn-start').textContent = 'Pause';
    primeAudio();
    scheduleAlarm(endAt);
    requestWake();
    if (cfg.notify && 'Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    ticker = setInterval(tick, 250);
    render();
  }
});

el('btn-reset').addEventListener('click', () => {
  clearInterval(ticker); ticker = null;
  running = false;
  remainSec = slot ? cfg[slot] * 60 : 0;
  totalSec = remainSec;
  el('btn-start').textContent = 'Start';
  el('btn-start').disabled = !slot;
  cancelAlarm(); stopChime(); releaseWake();
  render();
});

el('btn-lunch').addEventListener('click', () => pick('lunch'));
el('btn-afternoon').addEventListener('click', () => pick('afternoon'));

function finish() {
  clearInterval(ticker); ticker = null;
  running = false; remainSec = 0;
  cancelAlarm(); releaseWake();
  if (cfg.vibrate && navigator.vibrate) navigator.vibrate([500,200,500,200,500,200,800]);
  if (cfg.sound) startChime();
  fireNotification();
  el('done-which').textContent = slot === 'lunch' ? 'Lunch break' : 'Afternoon break';
  el('done-overlay').classList.add('open');
  el('btn-start').textContent = 'Start';
  render();
}

el('done-dismiss').addEventListener('click', () => {
  el('done-overlay').classList.remove('open');
  stopChime();
  if (navigator.vibrate) navigator.vibrate(0);
  // Reset for next break
  clearInterval(ticker); ticker = null;
  running = false;
  remainSec = slot ? cfg[slot] * 60 : 0;
  totalSec = remainSec;
  el('btn-start').textContent = 'Start';
  el('btn-start').disabled = !slot;
  render();
});

// ---- Audio ----
function primeAudio() {
  if (!audioCtx) {
    const C = window.AudioContext || window.webkitAudioContext;
    if (C) audioCtx = new C();
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, when, dur, vol) {
  if (!audioCtx) return;
  vol = vol || 0.28;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, when);
  g.gain.linearRampToValueAtTime(vol, when + 0.02);
  g.gain.linearRampToValueAtTime(0, when + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(when); o.stop(when + dur + 0.05);
}
function chime() {
  primeAudio();
  const t = audioCtx ? audioCtx.currentTime : 0;
  beep(523, t, 0.22); beep(659, t+0.16, 0.22); beep(784, t+0.32, 0.42);
}
function startChime() {
  if (!cfg.sound) return;
  chime();
  chimer = setInterval(chime, 1500);
}
function stopChime() { clearInterval(chimer); chimer = null; }

// ---- Notification ----
function fireNotification() {
  if (!cfg.notify || !('Notification' in window) || Notification.permission !== 'granted') return;
  const opts = {
    body: 'Your ' + slot + ' break is over.',
    icon: 'icon-192.png', tag: 'ms-bt', requireInteraction: true,
    vibrate: cfg.vibrate ? [500,200,500,200,500] : undefined,
    silent: false
  };
  if (navigator.serviceWorker && navigator.serviceWorker.ready) {
    navigator.serviceWorker.ready.then(r => r.showNotification('M&S Breaktimer \u2014 Time\u2019s up', opts));
  } else {
    try { new Notification('M&S Breaktimer \u2014 Time\u2019s up', opts); } catch(e){}
  }
}

// ---- SW alarm ----
function scheduleAlarm(ts) {
  if (navigator.serviceWorker && navigator.serviceWorker.controller)
    navigator.serviceWorker.controller.postMessage({ type:'alarm', endAt:ts, slot, vibrate:cfg.vibrate, notify:cfg.notify });
}
function cancelAlarm() {
  if (navigator.serviceWorker && navigator.serviceWorker.controller)
    navigator.serviceWorker.controller.postMessage({ type:'cancel' });
}

// ---- Wake lock ----
async function requestWake() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
}
function releaseWake() { if (wakeLock) { try { wakeLock.release(); } catch(e){} wakeLock = null; } }
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && running) requestWake();
});

// ---- Init ----
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
render();
</script>
</body>
</html>
